<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>프리미엄 수제 도장 시뮬레이터 PRO</title>
    <style>
        /* [폰트 설정] 기존 규칙 유지 */
        @font-face { font-family: 'B1'; src: url('body1.woff'); }
        @font-face { font-family: 'B2'; src: url('body2.woff'); }
        @font-face { font-family: 'B3'; src: url('body3.woff'); }
        @font-face { font-family: 'B4'; src: url('body4.woff'); }
        @font-face { font-family: 'B5'; src: url('body5.woff'); }
        @font-face { font-family: 'P01'; src: url('p1.woff'); }
        @font-face { font-family: 'P02'; src: url('p2.woff'); }
        @font-face { font-family: 'P03'; src: url('p3.woff'); }
        @font-face { font-family: 'P04'; src: url('p4.woff'); }
        @font-face { font-family: 'P05'; src: url('p5.woff'); }
        @font-face { font-family: 'P06'; src: url('p6.woff'); }
        @font-face { font-family: 'P07'; src: url('p7.woff'); }
        @font-face { font-family: 'P08'; src: url('p8.woff'); }
        @font-face { font-family: 'P09'; src: url('p9.woff'); }
        @font-face { font-family: 'P10'; src: url('p10.woff'); }

        :root { --point-pink: #e91e63; --soft-bg: #fdfafb; }
        body { font-family: 'Apple SD Gothic Neo', sans-serif; text-align: center; background: var(--soft-bg); padding: 20px; margin: 0; color: #444; }
        .box { background: white; padding: 30px; border-radius: 30px; display: inline-block; box-shadow: 0 20px 50px rgba(0,0,0,0.06); position: relative; max-width: 850px; text-align: left; }
        .controls { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; background: #fafafa; padding: 25px; border-radius: 20px; border: 1px solid #eee; }
        .control-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; align-items: end; }
        label { font-size: 11px; color: #999; margin-bottom: 6px; display: block; font-weight: bold; }
        input, select { padding: 12px; border: 1.5px solid #eee; border-radius: 10px; width: 100%; box-sizing: border-box; font-size: 14px; outline: none; }
        .canvas-wrapper { position: relative; display: inline-block; line-height: 0; border: 10px solid #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        canvas { max-width: 100%; height: auto; border-radius: 10px; }
        #videoContainer { position: absolute; overflow: hidden; background: #000; z-index: 10; pointer-events: none; border: 4px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .video-player { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: opacity 0.6s; }
    </style>
</head>
<body>

<div class="box">
    <div class="controls">
        <div class="control-row">
            <div>
                <label>도장 인면 이름 (첫글자=성)</label>
                <input type="text" id="printNameInput" value="강호석" oninput="draw()">
            </div>
            <div>
                <label>도장 몸통 새김글</label>
                <input type="text" id="bodyTextInput" value="STAMP" oninput="draw()">
            </div>
            <div>
                <label>💎 몸체 각인 폰트</label>
                <select id="bodyFontSelect" onchange="draw()"></select>
            </div>
        </div>
        <div class="control-row">
            <div>
                <label>돌 종류</label>
                <select id="stoneSelect" onchange="changeStone()">
                    <option value="stone1">청전석</option>
                    <option value="stone2">요녕석</option>
                    <option value="stone3">백두석</option>
                    <option value="stone4">밀크로즈석</option>
                </select>
            </div>
            <div>
                <label>몸체 각인 위치</label>
                <select id="posSelect" onchange="draw()">
                    <option value="P1">우측 하단 (전통)</option>
                    <option value="P2">중앙 하단 (심플-가로)</option>
                    <option value="P3" selected>우측 상단 (감성)</option>
                </select>
            </div>
            <div>
                <label>🔴 인영 폰트</label>
                <select id="printFontSelect" onchange="draw()"></select>
            </div>
        </div>
    </div>

    <div class="canvas-wrapper">
        <canvas id="canvas" width="768" height="1024"></canvas>
        <div id="videoContainer">
            <video id="v1" class="video-player" autoplay loop muted playsinline style="opacity: 1;"></video>
            <video id="v2" class="video-player" autoplay loop muted playsinline style="opacity: 0;"></video>
        </div>
    </div>
</div>

<script>
    /**
     * [CORE CONFIG - 인영 외부/내부 상하좌우 완전 제어]
     */
    const CONFIG = {
        print: {
            box_size: 160,       
            radius: 20,         
            border_width: 6,    
            red_color: "#b03a2e", 
            font_size: 60,      

            // 1. 도장면 전체 위치 (캔버스 내 위치)
            relief_x: 200,      // 양각 전체 가로
            relief_y: 680,      // 양각 전체 세로
            intaglio_x: 200,    // 음각 전체 가로
            intaglio_y: 890,    // 음각 전체 세로
            
            // 2. 내부 글자 개별 미세조정 (도장 중앙 기준)
            // 성씨(姓) 위치
            sur_x: -35,         
            sur_y: 0,           

            // 이름(名) 위치 (이름이 1글자일 때)
            given_single_x: 35,
            given_single_y: 0,

            // 이름(名) 위치 (이름이 2글자 이상일 때 - 위/아래 글자 간격)
            given_multi_x: 35,
            given_gap_y: 35     // 중앙 기준 위로 35, 아래로 35 배치
        },

        video: {
            top: "35px", right: "35px", width: "230px", height: "160px", radius: "15px"
        }
    };

    const BODY_FONTS = { 'B1': '감성 명조', 'B2': '모던 고딕', 'B3': '정갈한 서체', 'B4': '우아한 필기체', 'B5': '클래식 정체' };
    const PRINT_FONTS = { 'P01':'전서체','P02':'고인체','P03':'초서체','P04':'예서체','P05':'단정한 한글','P06':'귀여운 서체','P07':'굵은 도장체','P08':'세련된 서체','P09':'클래식 한자','P10':'모던 스탬프' };

    const STAMP_SETTINGS = {
        "stone1_P1": { x: 435, y: 740, size: 65, space: 15 }, "stone1_P2": { x: 384, y: 820, size: 65, space: 15 }, "stone1_P3": { x: 445, y: 170, size: 30, space: 5 },
        "stone2_P1": { x: 435, y: 740, size: 65, space: 15 }, "stone2_P2": { x: 384, y: 820, size: 65, space: 15 }, "stone2_P3": { x: 445, y: 170, size: 30, space: 5 },
        "stone3_P1": { x: 435, y: 740, size: 65, space: 15 }, "stone3_P2": { x: 384, y: 820, size: 65, space: 15 }, "stone3_P3": { x: 445, y: 170, size: 30, space: 5 },
        "stone4_P1": { x: 435, y: 740, size: 65, space: 15 }, "stone4_P2": { x: 384, y: 820, size: 65, space: 15 }, "stone4_P3": { x: 445, y: 170, size: 30, space: 5 }
    };

    const STONE_FILES = { "stone1": "stone1.jpg", "stone2": "stone2.jpg", "stone3": "stone3.jpg", "stone4": "stone4.jpg" };
    const VIDEO_MAP = { "stone1": "stone1_process.mp4", "stone2": "stone2_process.mp4", "stone3": "stone3_process.mp4", "stone4": "stone4_process.mp4" };

    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    const stoneImg = new Image();
    const v1 = document.getElementById('v1'), v2 = document.getElementById('v2');
    let curV = v1, nxtV = v2;

    function init() {
        const vc = document.getElementById('videoContainer');
        Object.assign(vc.style, { 
            top: CONFIG.video.top, right: CONFIG.video.right, width: CONFIG.video.width, height: CONFIG.video.height, borderRadius: CONFIG.video.radius 
        });
        const bSel = document.getElementById('bodyFontSelect'), pSel = document.getElementById('printFontSelect');
        Object.keys(BODY_FONTS).forEach(k => bSel.innerHTML += `<option value="${k}">${BODY_FONTS[k]}</option>`);
        Object.keys(PRINT_FONTS).forEach(k => pSel.innerHTML += `<option value="${k}">${PRINT_FONTS[k]}</option>`);
        changeStone();
    }

    function changeStone() {
        const val = document.getElementById('stoneSelect').value;
        stoneImg.src = STONE_FILES[val];
        const vPath = VIDEO_MAP[val];
        if (curV.getAttribute('src') !== vPath) {
            nxtV.src = vPath; nxtV.load();
            nxtV.oncanplaythrough = () => {
                nxtV.style.opacity = 1; curV.style.opacity = 0; nxtV.play().catch(()=>{});
                [curV, nxtV] = [nxtV, curV]; nxtV.oncanplaythrough = null;
            };
        }
        stoneImg.onload = draw;
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (stoneImg.complete) ctx.drawImage(stoneImg, 0, 0, canvas.width, canvas.height);

        const printFullName = document.getElementById('printNameInput').value;
        const bodyText = document.getElementById('bodyTextInput').value;
        const bFontKey = document.getElementById('bodyFontSelect').value;
        const pFontKey = document.getElementById('printFontSelect').value;
        const stone = document.getElementById('stoneSelect').value;
        const pos = document.getElementById('posSelect').value;

        drawBodyStamp(bodyText, bFontKey, stone, pos);
        
        const sur = printFullName.charAt(0);
        const given = printFullName.substring(1);

        renderAdvancedPrint(CONFIG.print.relief_x, CONFIG.print.relief_y, sur, given, pFontKey, false);
        renderAdvancedPrint(CONFIG.print.intaglio_x, CONFIG.print.intaglio_y, sur, given, pFontKey, true);
    }

    function drawBodyStamp(text, fontKey, stoneKey, posKey) {
        const cfg = STAMP_SETTINGS[`${stoneKey}_${posKey}`];
        ctx.save();
        ctx.fillStyle = "rgba(255, 255, 255, 0.85)"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.font = `600 ${cfg.size}px '${fontKey}', sans-serif`;
        
        if (posKey === 'P3') {
            let y = cfg.y;
            text.split('').forEach(char => {
                ctx.save(); ctx.translate(cfg.x, y); ctx.rotate(Math.PI / 2);
                ctx.fillText(char, 0, 0); ctx.restore(); y += cfg.size + cfg.space;
            });
        } else if (posKey === 'P2') {
            let totalW = (text.length * cfg.size) + ((text.length - 1) * cfg.space);
            let startX = cfg.x - (totalW / 2) + (cfg.size / 2);
            text.split('').forEach((char, i) => { ctx.fillText(char, startX + (i * (cfg.size + cfg.space)), cfg.y); });
        } else {
            let y = cfg.y;
            text.split('').forEach(char => { ctx.fillText(char, cfg.x, y); y += cfg.size + cfg.space; });
        }
        ctx.restore();
    }

    function renderAdvancedPrint(x, y, sur, given, fontKey, isNeg) {
        const p = CONFIG.print;
        const drawX = x - (p.box_size / 2), drawY = y - (p.box_size / 2);
        ctx.save();
        if (isNeg) {
            ctx.fillStyle = p.red_color; fillRRect(drawX, drawY, p.box_size, p.box_size, p.radius); ctx.fill();
            ctx.fillStyle = "#fff";
        } else {
            ctx.strokeStyle = p.red_color; ctx.lineWidth = p.border_width; fillRRect(drawX, drawY, p.box_size, p.box_size, p.radius); ctx.stroke();
            ctx.fillStyle = p.red_color;
        }
        ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.font = `${p.font_size}px '${fontKey}'`;

        // [성씨 렌더링] 상하좌우 적용
        ctx.fillText(sur || "", x + p.sur_x, y + p.sur_y);

        // [이름 렌더링] 상하좌우 적용
        if(given.length > 1) {
            // 이름이 2글자일 때 개별 상하좌우
            ctx.fillText(given[0], x + p.given_multi_x, y - p.given_gap_y);
            ctx.fillText(given[1], x + p.given_multi_x, y + p.given_gap_y);
        } else {
            // 이름이 1글자일 때 개별 상하좌우
            ctx.fillText(given || "", x + p.given_single_x, y + p.given_single_y);
        }
        ctx.restore();
    }

    function fillRRect(x, y, w, h, r) {
        ctx.beginPath(); ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r); ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h); ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r); ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y); ctx.closePath();
    }

    window.onload = init;
</script>
</body>
</html>
